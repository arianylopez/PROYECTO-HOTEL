<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Hotel</title>
    <link rel="stylesheet" href="./assets/css/variables.css">
    <script type="module" src="./src/app.js" defer></script>
    <link rel="stylesheet" href="./assets/css/global.css">
</head>
<body class="layout">
    
    <aside class="sidebar">
        <header class="sidebar__header">
            <div class="sidebar__logo-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
                    <path d="M9 22v-4h6v4"></path>
                    <path d="M8 6h.01"></path><path d="M16 6h.01"></path>
                    <path d="M12 6h.01"></path><path d="M12 10h.01"></path>
                    <path d="M12 14h.01"></path><path d="M16 10h.01"></path>
                    <path d="M16 14h.01"></path><path d="M8 10h.01"></path>
                    <path d="M8 14h.01"></path>
                </svg>
            </div>
            <div class="sidebar__logo-text">
                <h1 class="sidebar__title">Sistema Hotel</h1>
            </div>
        </header>

        <div class="sidebar__profile">
            <img src="icono.jpg" alt="Foto de perfil" class="sidebar__profile-img">
            <h2 class="sidebar__profile-name">Ariany Lopez</h2>
            <p class="sidebar__profile-role">Recepcionista</p>
        </div>

        <nav class="sidebar__nav">
            <a href="#" class="sidebar__link" data-route="dashboard">
                <svg class="sidebar__icon" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
                Dashboard
            </a>
            <a href="#" class="sidebar__link sidebar__link--active" data-route="huespedes">
                <svg class="sidebar__icon" viewBox="0 0 24 24">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
                Huéspedes
            </a>
            <a href="#" class="sidebar__link" data-route="reservas">
                <svg class="sidebar__icon" viewBox="0 0 24 24">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                Reservas
            </a>
            <a href="#" class="sidebar__link" data-route="habitaciones">
                <svg class="sidebar__icon" viewBox="0 0 24 24">
                    <path d="M2 4v16"></path>
                    <path d="M2 8h18a2 2 0 0 1 2 2v10"></path>
                    <path d="M2 17h20"></path>
                    <path d="M6 8v9"></path>
                </svg>
                Habitaciones
            </a>
            <a href="#" class="sidebar__link" data-route="servicios">
                <svg class="sidebar__icon" viewBox="0 0 24 24">
                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                </svg>
                Servicios
            </a>
        </nav>
    </aside>
    <main class="main-content" id="main-container">
    </main>
</body>
</html>
