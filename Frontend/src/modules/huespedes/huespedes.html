<link rel="stylesheet" href="./src/modules/huespedes/huespedes.css">

<div class="huespedes">
    <header class="huespedes__header">
        <h2 class="huespedes__title">Huéspedes Registrados</h2>
        <button class="huespedes__add-btn" id="btn-abrir-modal">
            <span class="huespedes__add-icon">+</span> Registrar Huésped
        </button>
    </header>

    <section class="huespedes__filters filter-bar">
        <div class="filter-bar__search-group">
            <span class="filter-bar__icon">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </span>
            <input type="text" class="filter-bar__input" id="input-busqueda" placeholder="Buscar por nombre, apellido, documento o email...">
        </div>
    </section>

    <section class="huespedes__list table-container">
        <table class="table-huespedes">
            <thead class="table-huespedes__header">
                <tr>
                    <th class="table-huespedes__th">Nombre Completo</th>
                    <th class="table-huespedes__th">Documento</th>
                    <th class="table-huespedes__th">Contacto</th>
                    <th class="table-huespedes__th">Nacionalidad</th>
                    <th class="table-huespedes__th">Fecha Registro</th>
                    <th class="table-huespedes__th table-huespedes__th--center">Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla-huespedes" class="table-huespedes__body">
                </tbody>
        </table>
    </section>

    <div class="modal" id="modal-registro-huesped">
        <div class="modal__overlay" id="modal-overlay"></div>
        <div class="modal__content">
            <header class="modal__header">
                <h3 class="modal__title" id="modal-titulo">Registrar Nuevo Huésped</h3>
                <button class="btn-reset modal__close" id="btn-cerrar-modal-x">x</button>
            </header>
            
            <form id="form-registro-huesped" class="modal__form form-huesped">
                <div class="form-huesped__grid">
                    <div class="form-huesped__group">
                        <label class="form-huesped__label" for="nombre">Nombre *</label>
                        <input class="form-huesped__input" type="text" id="nombre" required>
                    </div>
                    <div class="form-huesped__group">
                        <label class="form-huesped__label" for="apellido">Apellido *</label>
                        <input class="form-huesped__input" type="text" id="apellido" required>
                    </div>
                    <div class="form-huesped__group">
                        <label class="form-huesped__label" for="tipoDocumento">Tipo Documento *</label>
                        <select class="form-huesped__input" id="tipoDocumento" required>
                            <option value="Pasaporte">Pasaporte</option>
                            <option value="CI">CI</option>
                        </select>
                    </div>
                    <div class="form-huesped__group">
                        <label class="form-huesped__label" for="documentoIdentidad">Número Documento *</label>
                        <input class="form-huesped__input" type="text" id="documentoIdentidad" required>
                    </div>
                    <div class="form-huesped__group">
                        <label class="form-huesped__label" for="telefono">Teléfono</label>
                        <input class="form-huesped__input" type="text" id="telefono">
                    </div>
                    <div class="form-huesped__group">
                        <label class="form-huesped__label" for="correo">Correo Electrónico</label>
                        <input class="form-huesped__input" type="email" id="correo">
                    </div>
                    <div class="form-huesped__group form-huesped__group--full">
                        <label class="form-huesped__label" for="nacionalidad">Nacionalidad</label>
                        <input class="form-huesped__input" type="text" id="nacionalidad">
                    </div>
                    <div class="form-huesped__group form-huesped__group--full">
                        <label class="form-huesped__label" for="direccion">Dirección Completa</label>
                        <input class="form-huesped__input" type="text" id="direccion">
                    </div>
                </div>

                <div id="mensaje-formulario" class="modal__message"></div>

                <footer class="modal__footer">
                    <button type="button" class="form-huesped__btn form-huesped__btn--cancel" id="btn-cerrar-modal">Cancelar</button>
                    <button type="submit" class="form-huesped__btn form-huesped__btn--submit" id="btn-guardar">Registrar</button>
                </footer>
            </form>
        </div>
    </div>
</div>

<template id="template-fila-huesped">
    <tr class="table-huespedes__row">
        <td class="table-huespedes__td">
            <div class="perfil-info">
                <div class="perfil-info__avatar">👤</div>
                <div class="perfil-info__textos">
                    <span class="perfil-info__nombre celda-nombre"></span>
                    <span class="perfil-info__email celda-email"></span>
                </div>
            </div>
        </td>
        <td class="table-huespedes__td">
            <div class="doc-info">
                <span class="doc-info__tipo celda-tipo-doc"></span>
                <span class="doc-info__numero celda-doc"></span>
            </div>
        </td>
        <td class="table-huespedes__td">
            <div class="contacto-info">
                <span class="contacto-info__tel celda-telefono"></span>
                <span class="contacto-info__dir celda-direccion"></span>
            </div>
        </td>
        <td class="table-huespedes__td celda-nacionalidad"></td>
        <td class="table-huespedes__td celda-fecha"></td>
        <td class="table-huespedes__td table-huespedes__td--center">
            <button class="btn-reset btn-editar celda-btn-editar" title="Editar Huésped">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                </svg>
            </button>
        </td>
    </tr>
</template>
